<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin: 0; overflow-x: hidden; font-family: sans-serif; background: #222; color: #fff; }
.content { height: 2000px; padding: 20px; }
.header { position: fixed; top: 0; left: 0; right: 0; padding: 20px; background: rgba(0,0,0,0.5); border-bottom: 2px solid #555; }
.scrolled { background: red !important; }
</style>
</head>
<body>
  <div class="header" id="header">Navbar (Scroll to turn red)</div>
  <div class="content">
    <h1>Scroll Down</h1>
    <div id="log">scrollY: 0</div>
  </div>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('log').innerText = 'scrollY: ' + window.scrollY;
      if (window.scrollY > 50) {
        document.getElementById('header').classList.add('scrolled');
      } else {
        document.getElementById('header').classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
